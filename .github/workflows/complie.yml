name: Compile Pi1541 and CBM-FileBrowser

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Install ALL toolchains (ARM cross-compiler, ACME assembler, and VICE tools)
      - name: Install Compilers and Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi git build-essential acme vice

      # Step 2: Check out your main Pi1541 code
      - name: Checkout Pi1541 code
        uses: actions/checkout@v4
        with:
          path: pi1541-repo
          fetch-depth: 0

      # Step 3: Check out the CORRECT circle dependency repository
      - name: Checkout circle dependency
        uses: actions/checkout@v4
        with:
          repository: rsta2/circle
          path: circle-stdlib

      # Step 4: Configure the Circle dependency library
      - name: Configure Circle Library
        run: |
          cd circle-stdlib
          ./configure -r 1

      # Step 5: Patch the missing include in performance.c
      - name: Patch performance.c error
        run: |
          cd pi1541-repo
          sed -i 's/PRIu64/"llu"/g' src/performance.c

      # Step 6: Run the main compile process targeting the Raspberry Pi Zero V1
      - name: Run Main Makefile (Pi Zero Kernel)
        run: |
          cd pi1541-repo
          make RASPPI=0 legacy

      # Step 7: Compile the Commodore File Browser programs and the D64 disk image
      - name: Run FileBrowser Makefile
        run: |
          cd pi1541-repo/CBM-FileBrowser_v1.6/sources
          make all

      # Step 8: Save everything (Kernel, PRG files, and D64 Image) as Artifacts!
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PiZero-Pi1541-Complete-Package
          path: |
            pi1541-repo/kernel.*
            pi1541-repo/CBM-FileBrowser_v1.6/sources/*.prg
            pi1541-repo/CBM-FileBrowser_v1.6/sources/*.d64
