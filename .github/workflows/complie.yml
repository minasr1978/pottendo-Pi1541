name: Compile Pi1541 Project for Pi Zero

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Install toolchains needed for cross-compiling ARM (Raspberry Pi Zero) kernels
      - name: Install ARM Compiler Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi git build-essential

      # Step 2: Check out your main Pi1541 code into a specific folder
      - name: Checkout Pi1541 code
        uses: actions/checkout@v4
        with:
          path: pi1541-repo
          fetch-depth: 0 # Fetches all tags to fix the "git describe" fatal warning

      # Step 3: Check out the CORRECT circle dependency repository right next to it
      - name: Checkout circle dependency
        uses: actions/checkout@v4
        with:
          repository: rsta2/circle
          path: circle-stdlib

      # Step 4: Configure the Circle dependency library for Raspberry Pi Zero (Model 1)
      - name: Configure Circle Library
        run: |
          cd circle-stdlib
          ./configure -r 1

      # Step 5: Patch the missing include in performance.c
      - name: Patch performance.c error
        run: |
          cd pi1541-repo
          sed -i '1s/^/#include <inttypes.h>\n/' src/performance.c

      # Step 6: Run the compile process targeting the Raspberry Pi Zero V1
      - name: Run Makefile (Pi Zero Legacy Target)
        run: |
          cd pi1541-repo
          make RASPPI=0 legacy
